name: Repository Foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-foundation:
    name: repository-foundation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run canonical repository checks
        run: bash scripts/test.sh

      - name: Controlled-failure instructions
        run: |
          printf '%s\n' 'Controlled failure verification is documented in docs/BRANCH_PROTECTION.md.'
          printf '%s\n' 'Do not commit controlled-failure fixtures.'
