# nginx server for the FreeTier Atlas web frontend.
#
# - Serves the built React SPA with a history-API fallback.
# - Exposes a lightweight /healthz endpoint for the container healthcheck.
# - Reverse-proxies /api/ to the api service on the Docker Compose network so
#   the browser talks to the same origin and no CORS configuration is required.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Container liveness endpoint (used by the Docker healthcheck).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Reverse proxy to the API. The trailing slash on proxy_pass strips the
    # /api prefix, so /api/health -> http://api:8000/health.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
