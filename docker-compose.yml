# FreeTier Atlas — local development stack.
#
# Slice 1 brought up PostgreSQL and the FastAPI API. Slice 2 added the worker and
# scheduler services (a PostgreSQL-backed job queue). Slice 3 adds the React web
# frontend (nginx-served static build, reverse-proxying /api/ to the api service).
#
# Values are sourced from a local .env file (copy .env.example -> .env). The
# defaults are non-secret local development values and MUST NOT be used in any
# deployed environment.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://atlas:atlas@postgres:5432/atlas} # pragma: allowlist secret
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'python -c "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(''http://localhost:8000/health'', timeout=3).status==200 else sys.exit(1)"'
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: ["python", "-m", "worker.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://atlas:atlas@postgres:5432/atlas} # pragma: allowlist secret
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-2}
      HEARTBEAT_STALE_SECONDS: ${HEARTBEAT_STALE_SECONDS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "worker.health", "--service", "worker"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: ["python", "-m", "worker.scheduler"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://atlas:atlas@postgres:5432/atlas} # pragma: allowlist secret
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-5}
      HEARTBEAT_STALE_SECONDS: ${HEARTBEAT_STALE_SECONDS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "worker.health", "--service", "scheduler"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  atlas_pgdata:
